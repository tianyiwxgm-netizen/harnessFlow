<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>harnessFlow-ui — 任务管理</title>

<!-- Vue 3 + Element Plus + marked.js from CDN (no npm install) -->
<!-- Using vue.global.js (含 compiler) NOT .prod.js (后者没 compiler，in-DOM template 不工作) -->
<link rel="stylesheet" href="https://unpkg.com/element-plus@2.7.8/dist/index.css" />
<script src="https://unpkg.com/vue@3.4.38/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus@2.7.8/dist/index.full.min.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script src="https://unpkg.com/marked@13.0.3/marked.min.js"></script>
<!-- 移除 highlight.js（unpkg MIME 触发 chrome ORB → hljs undefined → Vue mount 阻断） -->
<!-- marked 默认渲染 code block 不高亮即可（mock UI 无需语法高亮） -->

<style>
  body { margin: 0; font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; }
  #app { height: 100vh; }
  .harness-header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
    color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px;
  }
  .harness-header h1 { margin: 0; font-size: 20px; font-weight: 500; }
  .harness-header .subtitle { font-size: 13px; opacity: 0.85; }
  .stats-strip { display: flex; gap: 32px; margin-left: auto; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-label { font-size: 11px; opacity: 0.85; text-transform: uppercase; }
  .main-layout { display: flex; height: calc(100vh - 72px); }
  .sidebar { width: 320px; border-right: 1px solid #ebeef5; overflow-y: auto; background: #fafbfc; }
  .content { flex: 1; overflow-y: auto; padding: 20px 32px; }
  .task-card {
    padding: 14px 16px; border-bottom: 1px solid #ebeef5; cursor: pointer;
    transition: background 0.15s;
  }
  .task-card:hover { background: #f0f4f8; }
  .task-card.active { background: #e6f0fd; border-left: 3px solid #409eff; }
  .task-title { font-size: 14px; font-weight: 500; color: #303133; margin-bottom: 4px;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-meta { display: flex; gap: 8px; font-size: 11px; align-items: center; }
  .task-id-small { color: #909399; font-family: Menlo, monospace; font-size: 10px;
                    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress-mini { margin-top: 6px; height: 4px; background: #ebeef5; border-radius: 2px;
                    overflow: hidden; }
  .progress-mini-fill { height: 100%; background: #67c23a; transition: width 0.3s; }
  .progress-mini-fill.paused { background: #e6a23c; }
  .progress-mini-fill.failed { background: #f56c6c; }
  .section-header { background: #f2f6fc; padding: 6px 16px; font-size: 11px; font-weight: 600;
                     color: #606266; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-header { margin-bottom: 20px; }
  .detail-goal { background: #fefce8; border-left: 4px solid #f0c808; padding: 12px 16px;
                  font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .detail-dod { background: #f0f9ff; border-left: 4px solid #409eff; padding: 10px 14px;
                  font-size: 12px; font-family: Menlo, monospace; margin-bottom: 16px;
                  overflow-x: auto; }
  /* ========= 后台管理 styles ========= */
  .admin-menu { padding: 4px 0; }
  .admin-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px; cursor: pointer; font-size: 13px;
    border-left: 3px solid transparent; transition: all 0.15s;
  }
  .admin-menu-item:hover { background: #f0f4f8; }
  .admin-menu-item.active {
    background: #e6f0fd; border-left-color: #409eff; color: #409eff; font-weight: 600;
  }
  .admin-menu-badge { margin-left: auto; font-size: 11px; color: #909399; }
  .admin-menu-sep {
    height: 1px; background: #ebeef5; margin: 6px 14px;
  }
  .admin-menu-group {
    padding: 10px 16px 4px; font-size: 11px; color: #909399;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .admin-section h2 { margin-top: 0; margin-bottom: 6px; font-size: 20px; color: #303133; }
  .admin-section .admin-desc { color: #606266; font-size: 13px; margin-bottom: 16px; }
  .admin-card {
    background: #fff; border: 1px solid #e4e7ed; border-radius: 6px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .admin-card-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    font-size: 14px; font-weight: 600; color: #303133;
  }
  .admin-card-body { font-size: 13px; line-height: 1.7; color: #606266; }
  .admin-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .admin-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .admin-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .admin-matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .admin-matrix-table th, .admin-matrix-table td {
    border: 1px solid #e4e7ed; padding: 6px 8px; vertical-align: top;
  }
  .admin-matrix-table th { background: #f2f6fc; text-align: left; font-weight: 600; color: #606266; }
  .admin-matrix-table td code { font-size: 11px; color: #409eff; }
  .admin-chip {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; background: #ecf5ff; color: #409eff; margin: 2px 4px 2px 0;
  }
  .admin-red { background: #fef0f0; color: #f56c6c; }
  .admin-yellow { background: #fdf6ec; color: #e6a23c; }
  .admin-green { background: #f0f9eb; color: #67c23a; }
  .admin-status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    vertical-align: middle; margin-right: 4px;
  }
  .admin-status-dot.ok { background: #67c23a; }
  .admin-status-dot.warn { background: #e6a23c; }
  .admin-status-dot.fail { background: #f56c6c; }
  .admin-kv-row {
    display: flex; padding: 6px 0; border-bottom: 1px dashed #ebeef5; font-size: 12px;
  }
  .admin-kv-row:last-child { border-bottom: none; }
  .admin-kv-key { width: 160px; color: #909399; flex-shrink: 0; }
  .admin-kv-val { flex: 1; color: #303133; }
  .admin-bar {
    height: 8px; background: #ebeef5; border-radius: 4px; overflow: hidden; margin-top: 4px;
  }
  .admin-bar-fill { height: 100%; background: #409eff; transition: width 0.3s; }
  .admin-bar-fill.success { background: #67c23a; }
  .admin-bar-fill.warn { background: #e6a23c; }
  .admin-bar-fill.fail { background: #f56c6c; }
  .admin-btn-header {
    margin-left: 12px; background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3); color: #fff;
  }
  .admin-btn-header:hover { background: rgba(255,255,255,0.25); }

  .tabs-area { margin-top: 16px; }
  /* 11 tabs fit one row — 收紧 padding + 允许换行兜底 */
  .tabs-area :deep(.el-tabs__nav-wrap),
  .tabs-area .el-tabs__nav-wrap { overflow: visible !important; }
  .tabs-area .el-tabs__nav { flex-wrap: wrap !important; white-space: normal !important; }
  .tabs-area .el-tabs__item { padding: 0 10px !important; font-size: 13px; height: 36px; line-height: 36px; }
  .tabs-area .el-tabs__nav-next, .tabs-area .el-tabs__nav-prev { display: none !important; }
  .timeline-state { font-family: Menlo, monospace; font-size: 11px; }
  .timeline-trigger { color: #909399; font-size: 11px; margin-left: 12px; }
  .artifact-row { padding: 8px 12px; border-bottom: 1px solid #f0f0f0;
                  cursor: pointer; font-size: 12px; display: flex; gap: 10px; align-items: center; }
  .artifact-row:hover { background: #f5f7fa; }
  .artifact-kind {
    font-size: 10px; padding: 2px 8px; border-radius: 3px;
    background: #e4e7ed; color: #606266; font-weight: 500;
    text-transform: uppercase;
  }
  .artifact-kind.retro { background: #fef0f0; color: #f56c6c; }
  .artifact-kind.spec { background: #ecf5ff; color: #409eff; }
  .artifact-kind.plan { background: #f0f9eb; color: #67c23a; }
  .artifact-kind.research { background: #fdf6ec; color: #e6a23c; }
  .artifact-kind.verifier_report { background: #f2e6ff; color: #8a2be2; }
  .md-renderer { padding: 16px 24px; background: #fff; border-radius: 4px;
                  border: 1px solid #ebeef5; max-height: 70vh; overflow-y: auto; }
  .md-renderer h1 { border-bottom: 2px solid #ebeef5; padding-bottom: 6px; font-size: 20px; }
  .md-renderer h2 { border-bottom: 1px solid #ebeef5; padding-bottom: 4px; font-size: 16px; }
  .md-renderer code { background: #f5f7fa; padding: 2px 6px; border-radius: 3px;
                       font-family: Menlo, monospace; font-size: 12px; }
  .md-renderer pre { background: #f5f7fa; padding: 12px 16px; border-radius: 4px;
                      overflow-x: auto; }
  .md-renderer pre code { background: transparent; padding: 0; }
  .md-renderer table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  .md-renderer th, .md-renderer td { border: 1px solid #ebeef5; padding: 6px 12px; font-size: 13px; }
  .md-renderer th { background: #f5f7fa; }
  .kb-card { border: 1px solid #ebeef5; border-radius: 6px; padding: 14px 18px;
              margin-bottom: 12px; }
  .kb-card .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .kb-card .desc { color: #606266; font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
  .kb-card .meta { display: flex; gap: 12px; font-size: 11px; color: #909399; align-items: center; }
  .scope-global { background: #409eff; color: #fff; }
  .scope-project { background: #67c23a; color: #fff; }
  .scope-session { background: #e6a23c; color: #fff; }
  .status-active { background: #67c23a; }
  .status-deprecated { background: #909399; }
  .status-expired { background: #f56c6c; }
  .empty-hint { color: #909399; font-size: 14px; text-align: center; padding: 40px 0; }
  .loop-item { padding: 10px 14px; border-left: 3px solid #409eff; background: #f0f9ff;
                margin-bottom: 8px; font-size: 12px; }
  .loop-item .trigger { font-weight: 600; }
  .tdd-case { padding: 8px 12px; border-bottom: 1px solid #f0f0f0;
              display: flex; gap: 12px; font-size: 12px; align-items: center; }
  .tdd-pass { color: #67c23a; }
  .tdd-fail { color: #f56c6c; }
  .tdd-pending { color: #909399; }
  .delivery-grid { display: grid; grid-template-columns: 1fr 1fr;
                    gap: 12px 24px; font-size: 13px; }
  .delivery-grid dt { color: #909399; margin-bottom: 4px; font-size: 11px;
                       text-transform: uppercase; letter-spacing: 0.5px; }
  .delivery-grid dd { margin: 0 0 12px 0; font-family: Menlo, monospace; font-size: 12px;
                       color: #303133; }
  .plan-step { display: flex; gap: 12px; padding: 12px 14px; border-left: 3px solid #ebeef5;
                margin-bottom: 6px; background: #fafbfc; border-radius: 0 4px 4px 0; }
  .plan-step:hover { background: #f0f4f8; }
  .plan-step-icon { flex-shrink: 0; padding-top: 2px; }
  .plan-step-body { flex: 1; }
  .plan-step-head { display: flex; align-items: center; margin-bottom: 4px; }
  .plan-step-stage { font-family: Menlo, monospace; font-weight: 600; color: #303133; font-size: 13px; }
  .plan-step-label { font-size: 13px; color: #606266; margin-top: 2px; }
  .plan-step-trigger { font-size: 11px; color: #909399; margin-top: 3px; font-family: Menlo, monospace; }
  .supv-event { display: flex; gap: 10px; align-items: center; padding: 8px 14px;
                 font-size: 12px; border-bottom: 1px solid #f0f0f0; }
  .supv-badge { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
                  min-width: 46px; text-align: center; }
  .supv-kind { font-family: Menlo, monospace; color: #303133; font-size: 11px; }
  .supv-code { font-family: Menlo, monospace; color: #409eff; font-size: 11px; }
  .supv-info .supv-badge { background: #ecf5ff; color: #409eff; }
  .supv-warn .supv-badge { background: #fdf6ec; color: #e6a23c; }
  .supv-block .supv-badge { background: #fef0f0; color: #f56c6c; }

  /* DoD standards */
  .dod-standard { display: flex; gap: 10px; align-items: center; padding: 8px 12px;
                    border-bottom: 1px dashed #ebeef5; }
  .dod-standard code { background: #f5f7fa; padding: 3px 10px; border-radius: 4px;
                        font-size: 12px; color: #303133; flex: 1; }

  /* WBS */
  .wbs-pg { border-left: 5px solid #ebeef5; padding: 12px 16px; margin-bottom: 12px;
              background: #fafbfc; border-radius: 0 6px 6px 0; }
  .wbs-pg:hover { background: #f0f4f8; }
  .wbs-pg-head { display: flex; align-items: center; margin-bottom: 8px; }
  .wbs-pg-name { font-weight: 600; font-size: 14px; color: #303133; }
  .wbs-children { padding-left: 14px; }
  .wbs-step { display: flex; gap: 8px; align-items: center; padding: 5px 0; font-size: 13px; }
  .wbs-step-name { font-family: Menlo, monospace; color: #303133; }

  /* PMP 10 领域 grid */
  .pmp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 8px 0; }
  .pmp-card { border: 1px solid #ebeef5; border-radius: 6px; padding: 12px 14px;
                background: #fafbfc; }
  .pmp-card.pmp-green { border-left: 4px solid #67c23a; }
  .pmp-card.pmp-yellow { border-left: 4px solid #e6a23c; background: #fefaf0; }
  .pmp-card.pmp-red { border-left: 4px solid #f56c6c; background: #fef5f5; }
  .pmp-card-head { display: flex; align-items: center; margin-bottom: 4px; }
  .pmp-card-title { font-size: 13px; font-weight: 600; color: #303133; }
  .pmp-health-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
                     margin-left: auto; }
  .pmp-health-dot.dot-green { background: #67c23a; }
  .pmp-health-dot.dot-yellow { background: #e6a23c; }
  .pmp-health-dot.dot-red { background: #f56c6c; }
  .pmp-card-desc { font-size: 11px; color: #909399; margin-bottom: 6px; }
  .pmp-card-body { font-size: 12px; }
  .pmp-metric { display: flex; justify-content: space-between; padding: 2px 0; }
  .pmp-metric-key { color: #606266; font-family: Menlo, monospace; font-size: 11px; }
  .pmp-metric-val { color: #303133; font-weight: 500; }

  /* 项目资料库 */
  .lib-row { display: flex; gap: 12px; align-items: center; padding: 10px 14px;
              border-bottom: 1px solid #f0f0f0; font-size: 13px; cursor: pointer; }
  .lib-row:hover { background: #f5f7fa; }
  .artifact-kind.repo { background: #303133; color: #fff; }
  .artifact-kind.ui { background: #409eff; color: #fff; }
  .artifact-kind.process { background: #8a2be2; color: #fff; }
  .artifact-kind.research { background: #fdf6ec; color: #e6a23c; }
  .artifact-kind.spec { background: #ecf5ff; color: #409eff; }
  .artifact-kind.retro { background: #fef0f0; color: #f56c6c; }
  .artifact-kind.plan { background: #f0f9eb; color: #67c23a; }
  .artifact-kind.verifier_report { background: #f2e6ff; color: #8a2be2; }
</style>
</head>
<body>

<div id="app">
  <div class="harness-header">
    <el-icon :size="28" color="#4cd4ff"><Grid /></el-icon>
    <div>
      <h1>HarnessFlow</h1>
      <div class="subtitle">{{ projectFilterLabel }} · 任务管理 + 知识库</div>
    </div>
    <div class="stats-strip">
      <div class="stat"><div class="stat-value">{{ stats.total }}</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-value">{{ stats.active }}</div><div class="stat-label">Active</div></div>
      <div class="stat"><div class="stat-value">{{ stats.paused }}</div><div class="stat-label">Paused</div></div>
      <div class="stat"><div class="stat-value">{{ stats.closed }}</div><div class="stat-label">Closed</div></div>
      <div class="stat"><div class="stat-value">{{ stats.success_rate_pct }}%</div><div class="stat-label">Success</div></div>
    </div>
    <el-button @click="toggleAdmin" size="small" class="admin-btn-header">
      {{ currentView === 'admin' ? '← 返回任务视图' : '⚙️ 后台管理' }}
    </el-button>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div style="padding: 12px 16px;" v-if="currentView !== 'admin'">
        <el-input v-model="searchQuery" placeholder="搜索 task_id / goal / state" clearable
                   size="small" prefix-icon="Search"></el-input>
        <el-select v-model="currentView" size="small" style="width:100%; margin-top:8px;">
          <el-option label="📋 任务列表" value="tasks"></el-option>
          <el-option label="🧠 知识库" value="kb"></el-option>
          <el-option label="📁 项目" value="projects"></el-option>
        </el-select>
      </div>

      <template v-if="currentView === 'admin'">
        <div class="admin-menu-group">执行引擎</div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'engine_config' }" @click="adminSection = 'engine_config'">
          <span>⚙️</span><span>执行引擎配置</span>
          <span class="admin-menu-badge">{{ (adminData.engine_config || {}).routes ? adminData.engine_config.routes.length + '路线' : '' }}</span>
        </div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'engine_instances' }" @click="adminSection = 'engine_instances'">
          <span>🚀</span><span>执行实例</span>
          <span class="admin-menu-badge">{{ (adminData.engine_instances || {}).total || 0 }}</span>
        </div>

        <div class="admin-menu-sep"></div>
        <div class="admin-menu-group">知识与监督</div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'knowledge_base' }" @click="adminSection = 'knowledge_base'">
          <span>📚</span><span>知识库</span>
          <span class="admin-menu-badge">{{ (adminData.knowledge_base || {}).total_entries || 0 }}</span>
        </div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'supervisor_agent' }" @click="adminSection = 'supervisor_agent'">
          <span>🛡️</span><span>Harness 监督智能体</span>
          <span class="admin-menu-badge" style="color:#67c23a;">● online</span>
        </div>

        <div class="admin-menu-sep"></div>
        <div class="admin-menu-group">注册表</div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'primitives_registry' }" @click="adminSection = 'primitives_registry'">
          <span>🔬</span><span>Verifier 原语库</span>
          <span class="admin-menu-badge">{{ (adminData.primitives_registry || {}).count || 0 }}</span>
        </div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'subagents_registry' }" @click="adminSection = 'subagents_registry'">
          <span>🤖</span><span>Subagents 注册表</span>
          <span class="admin-menu-badge">{{ (adminData.subagents_registry || {}).count || 0 }}</span>
        </div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'skills_registry' }" @click="adminSection = 'skills_registry'">
          <span>🧩</span><span>Skills 调用图</span>
          <span class="admin-menu-badge">{{ (adminData.skills_registry || {}).count || 0 }}</span>
        </div>

        <div class="admin-menu-sep"></div>
        <div class="admin-menu-group">观测与诊断</div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'analytics' }" @click="adminSection = 'analytics'">
          <span>📊</span><span>统计分析</span>
        </div>
        <div class="admin-menu-item" :class="{ active: adminSection === 'diagnostics' }" @click="adminSection = 'diagnostics'">
          <span>🔍</span><span>系统诊断</span>
        </div>
      </template>

      <template v-if="currentView === 'tasks'">
        <template v-for="group in groupedTasks" :key="group.label">
          <div class="section-header" v-if="group.items.length > 0">
            {{ group.label }} ({{ group.items.length }})
          </div>
          <div class="task-card" v-for="t in group.items" :key="t.task_id"
                :class="{ active: selectedTaskId === t.task_id }"
                @click="selectTask(t.task_id)">
            <div class="task-title">{{ (t.goal_text || t.initial_user_input || t.task_id) }}</div>
            <div class="task-meta">
              <el-tag size="small" :type="stateTagType(t.current_state)">{{ t.current_state }}</el-tag>
              <el-tag size="small" effect="plain">{{ t.route_id || '?' }}</el-tag>
              <span style="color:#909399">{{ t.task_type || '' }}</span>
              <span v-if="t._scope !== 'main'" style="color:#e6a23c; font-weight:600">{{ t._scope }}</span>
            </div>
            <div class="task-id-small">{{ t.task_id }}</div>
            <div class="progress-mini">
              <div class="progress-mini-fill"
                    :class="progressFillClass(t)"
                    :style="{ width: (t.progress_percentage || 0) + '%' }"></div>
            </div>
          </div>
        </template>
      </template>

      <template v-else-if="currentView === 'kb'">
        <div style="padding: 12px 16px;">
          <el-select v-model="kbKindFilter" size="small" placeholder="kind" clearable
                      style="width: 100%; margin-bottom: 6px;">
            <el-option label="反模式" value="anti_pattern"></el-option>
            <el-option label="有效组合" value="effective_combo"></el-option>
            <el-option label="外部引用" value="external_ref"></el-option>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue;
const ELIcons = ElementPlusIconsVue;

const API = {
  async tasks() { return (await fetch('/api/tasks')).json(); },
  async task(id) { return (await fetch('/api/tasks/' + encodeURIComponent(id))).json(); },
  async md(id, path) {
    const r = await fetch('/api/tasks/' + encodeURIComponent(id) + '/md?path=' + encodeURIComponent(path));
    if (!r.ok) return null;
    return r.text();
  },
  async kb() { return (await fetch('/api/kb')).json(); },
  async projects() { return (await fetch('/api/projects')).json(); },
  async stats() { return (await fetch('/api/stats')).json(); },
  async admin() { return (await fetch('/api/admin')).json(); },
};

// marked config (no highlight — sidestep CDN MIME issue)
marked.setOptions({ gfm: true, breaks: false });

createApp({
  setup() {
    const tasks = ref([]);
    const detail = ref(null);
    const selectedTaskId = ref(null);
    const searchQuery = ref('');
    const currentView = ref('tasks');
    const activeTab = ref('delivery_goals');
    const kbEntries = ref([]);
    const kbKindFilter = ref('');
    const kbScopeFilter = ref('');
    const projects = ref([]);
    const stats = ref({ total: 0, active: 0, paused: 0, closed: 0, success_rate_pct: 0 });
    const mdDialogVisible = ref(false);
    const mdDialogPath = ref('');
    const mdRendered = ref('');
    const adminData = ref({});
    const adminSection = ref('engine_config');
    const previousView = ref('tasks');

    const filteredTasks = computed(() => {
      const q = searchQuery.value.toLowerCase();
      if (!q) return tasks.value;
      return tasks.value.filter(t =>
        (t.task_id || '').toLowerCase().includes(q) ||
        (t.goal_text || '').toLowerCase().includes(q) ||
        (t.current_state || '').toLowerCase().includes(q) ||
        (t.initial_user_input || '').toLowerCase().includes(q) ||
        (t.task_type || '').toLowerCase().includes(q)
      );
    });

    const groupedTasks = computed(() => {
      const active = [], paused = [], closed = [];
      for (const t of filteredTasks.value) {
        const s = t.current_state;
        if (s === 'CLOSED' || s === 'ABORTED') closed.push(t);
        else if (s === 'PAUSED_ESCALATED') paused.push(t);
        else active.push(t);
      }
      return [
        { label: '🔥 进行中', items: active },
        { label: '⏸ 暂停中', items: paused },
        { label: '✅ 已完成', items: closed },
      ];
    });

    const filteredKb = computed(() => {
      return kbEntries.value.filter(e =>
        (!kbKindFilter.value || e.kind === kbKindFilter.value) &&
        (!kbScopeFilter.value || e.scope === kbScopeFilter.value)
      );
    });

    const projectFilterLabel = computed(() => {
      return 'Project: ' + (projects.value[0]?.name || 'harnessFlow-meta');
    });

    function stateTagType(s) {
      if (s === 'CLOSED') return 'success';
      if (s === 'PAUSED_ESCALATED') return 'warning';
      if (s === 'ABORTED') return 'danger';
      return 'primary';
    }
    function riskType(r) {
      if (r === '低') return 'success';
      if (r === '中') return 'warning';
      if (r === '高' || r === '不可逆') return 'danger';
      return 'info';
    }
    function stateTimelineType(s) {
      if (s === 'CLOSED') return 'success';
      if (s === 'PAUSED_ESCALATED') return 'warning';
      if (s === 'ABORTED') return 'danger';
      if (s === 'VERIFY' || s === 'COMMIT') return 'primary';
      return '';
    }
    function progressFillClass(t) {
      if (t.current_state === 'PAUSED_ESCALATED') return 'paused';
      if (t.final_outcome === 'failed' || t.final_outcome === 'aborted') return 'failed';
      return '';
    }
    function kbScopeType(s) {
      return s === 'global' ? 'primary' : (s === 'project' ? 'success' : 'warning');
    }
    function kbKindType(k) {
      return { anti_pattern: 'danger', effective_combo: 'success',
                external_ref: 'info', trap: 'warning' }[k] || '';
    }
    function healthTagType(h) {
      return { green: 'success', yellow: 'warning', red: 'danger' }[h] || 'info';
    }

    // 8 维度 metric key 中文化映射
    const metricKeyCn = {
      // goal_fidelity
      goal_anchor_hash_drift: '目标锚 hash 漂移',
      claude_md_tamper_count: 'CLAUDE.md 篡改次数',
      goal_preserved: '目标保留',
      // plan_alignment
      actual_states: '实际阶段数',
      expected_states: '预期阶段数',
      variance_pct: '偏差百分比 (%)',
      skipped_stages: '跳过阶段数',
      route_changes: '路线切换次数',
      // true_completion
      verifier_pass_rate: 'Verifier 通过率',
      tdd_cases_total: 'TDD 用例总数',
      tdd_pass: 'TDD 通过数',
      evidence_segments_filled: '证据段填充',
      flaky_count: 'flaky 数量',
      // red_lines_safety
      drift_critical: '目标漂移',
      dod_gap_alert: '交付标准缺段',
      irreversible_halt: '不可逆前置缺失',
      cross_project_creep: '跨项目串误',
      total_red_lines: '红线触发总数',
      // progress_pace
      elapsed_sec: '已耗时 (秒)',
      cap_sec: '上限 (秒)',
      tool_calls_total: '工具调用总数',
      avg_tools_per_stage: '每阶段平均工具数',
      subagents_spawned: 'subagent 拉起次数',
      // cost_budget
      tokens_used: 'token 已用',
      tokens_cap: 'token 上限',
      utilization: '利用率',
      context_tokens: 'context 已用',
      context_threshold: 'context 阈值',
      // retry_loop
      retry_count: 'retry 次数',
      santa_loop_rounds: 'santa-loop 轮数',
      replan_count: 'replan 次数',
      stuck_pattern_detected: '卡死模式检测',
      warn_counter: 'WARN 累计',
      // user_collaboration
      user_interrupts: '用户打断次数',
      clarify_rounds: '澄清轮次',
      pause_events: '暂停事件数',
      waste_questions: '废问题数',
    };

    async function selectTask(id) {
      selectedTaskId.value = id;
      activeTab.value = 'delivery_goals';
      const r = await API.task(id);
      detail.value = r;
    }

    async function previewMd(path) {
      mdDialogPath.value = path;
      const content = await API.md(selectedTaskId.value, path);
      if (content === null) {
        mdRendered.value = '<div class="empty-hint">无法读取文件或不允许访问</div>';
      } else {
        mdRendered.value = marked.parse(content);
      }
      mdDialogVisible.value = true;
    }

    function jumpToKb(ref) {
      currentView.value = 'kb';
      // Could scroll to kb card; left as TODO
    }

    async function toggleAdmin() {
      if (currentView.value === 'admin') {
        currentView.value = previousView.value || 'tasks';
      } else {
        previousView.value = currentView.value;
        currentView.value = 'admin';
        if (!adminData.value.engine_config) {
          const r = await API.admin();
          adminData.value = r;
        }
      }
    }

    async function load() {
      const [t, k, p, s] = await Promise.all([
        API.tasks(), API.kb(), API.projects(), API.stats()
      ]);
      tasks.value = t.tasks;
      kbEntries.value = k.entries;
      projects.value = p.projects;
      stats.value = s;
    }

    onMounted(load);

    return {
      tasks, detail, selectedTaskId, searchQuery, currentView, activeTab,
      kbEntries, kbKindFilter, kbScopeFilter, projects, stats,
      mdDialogVisible, mdDialogPath, mdRendered,
      adminData, adminSection,
      filteredTasks, groupedTasks, filteredKb, projectFilterLabel,
      stateTagType, riskType, stateTimelineType, progressFillClass,
      kbScopeType, kbKindType, healthTagType, metricKeyCn,
      selectTask, previewMd, jumpToKb, toggleAdmin,
    };
  },
}).use(ElementPlus).component('Grid', ELIcons.Grid)
   .component('View', ELIcons.View)
   .component('CircleCheck', ELIcons.CircleCheck)
   .component('CircleClose', ELIcons.CircleClose)
   .component('Clock', ELIcons.Clock)
   .component('Search', ELIcons.Search)
   .component('Loading', ELIcons.Loading)
   .mount('#app');
</script>
</body>
</html>
